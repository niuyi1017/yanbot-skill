<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>研bot Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; }
header { background: #1a1a2e; color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
header h1 { font-size: 1.25rem; font-weight: 600; }
.badge { font-size: 0.75rem; padding: 0.25rem 0.6rem; border-radius: 99px; font-weight: 500; }
.badge.connecting { background: #666; }
.badge.ready { background: #16a34a; }
.badge.error { background: #dc2626; }
main { max-width: 960px; margin: 1.5rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1.25rem; }
.card { background: #fff; border-radius: 8px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: #1a1a2e; }
.row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
input { flex: 1; min-width: 120px; padding: 0.4rem 0.6rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.875rem; }
button { padding: 0.4rem 1rem; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.875rem; white-space: nowrap; }
button:disabled { opacity: .45; cursor: not-allowed; }
button:not(:disabled):hover { background: #2d2d5a; }
.result { font-size: 0.85rem; color: #666; min-height: 1.5rem; }
.result.loading { font-style: italic; }
.result.error { color: #dc2626; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { background: #f9fafb; font-weight: 600; color: #374151; }
th, td { padding: 0.45rem 0.6rem; border: 1px solid #e5e7eb; text-align: left; }
tr:nth-child(even) td { background: #fafafa; }
</style>
</head>
<body>
<header>
  <h1>研bot Dashboard</h1>
  <span id="badge" class="badge connecting">连接中…</span>
</header>
<main>
  <!-- 院校查询 -->
  <div class="card">
    <h2>院校查询</h2>
    <div class="row">
      <input id="s-kw" placeholder="关键词，如：航空大学">
      <button id="s-btn" onclick="searchSchools()" disabled>查询</button>
    </div>
    <div id="s-res" class="result"></div>
  </div>

  <!-- 分数线查询 -->
  <div class="card">
    <h2>分数线查询</h2>
    <div class="row">
      <input id="sc-school" placeholder="学校名，如：北京大学">
      <input id="sc-year" placeholder="年份，如：2024" style="max-width:110px">
      <button id="sc-btn" onclick="searchScores()" disabled>查询</button>
    </div>
    <div id="sc-res" class="result"></div>
  </div>

  <!-- 调剂查询 -->
  <div class="card">
    <h2>调剂查询</h2>
    <div class="row">
      <input id="adj-score" placeholder="最低初试分，如：340" style="max-width:160px">
      <input id="adj-subject" placeholder="调剂目标学校名，如：武汉大学">
      <button id="adj-btn" onclick="searchAdjustments()" disabled>查询</button>
    </div>
    <div id="adj-res" class="result"></div>
  </div>
</main>
<script>
const badge = document.getElementById('badge');
const btns = ['s-btn', 'sc-btn', 'adj-btn'].map(id => document.getElementById(id));
let ready = false;

async function callTool(tool, args) {
  const res = await fetch('/api/call', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tool, args }),
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error);
  return json.data;
}

function setReady(r) {
  ready = r;
  btns.forEach(b => b.disabled = !r);
  badge.className = 'badge ' + (r ? 'ready' : 'connecting');
  badge.textContent = r ? '已连接' : '连接中…';
}

function setError() {
  badge.className = 'badge error';
  badge.textContent = '连接失败';
}

async function pollStatus() {
  try {
    const r = await fetch('/api/status');
    const j = await r.json();
    setReady(j.ready);
    if (!j.ready) setTimeout(pollStatus, 2000);
  } catch {
    setError();
  }
}

pollStatus();

function renderTable(el, rows, cols) {
  if (!rows || rows.length === 0) {
    el.className = 'result';
    el.textContent = '暂无数据';
    return;
  }
  const colDefs = Object.entries(cols);
  let html = '<table><thead><tr>' + colDefs.map(([, label]) => `<th>${label}</th>`).join('') + '</tr></thead><tbody>';
  for (const row of rows) {
    html += '<tr>' + colDefs.map(([key]) => `<td>${row[key] ?? ''}</td>`).join('') + '</tr>';
  }
  html += '</tbody></table>';
  el.className = 'result';
  el.innerHTML = html;
}

async function searchSchools() {
  const el = document.getElementById('s-res');
  el.className = 'result loading';
  el.textContent = '查询中…';
  try {
    const data = await callTool('query_schools', {
      keyword: document.getElementById('s-kw').value.trim() || undefined,
      pageSize: 15,
    });
    renderTable(el, data.list || data.data, { name: '学校名', provinceText: '省份', typeText: '类型', is985: '985', is211: '211' });
  } catch (e) {
    el.className = 'result error';
    el.textContent = '查询失败：' + e.message;
  }
}

async function searchScores() {
  const el = document.getElementById('sc-res');
  el.className = 'result loading';
  el.textContent = '查询中…';
  const year = document.getElementById('sc-year').value.trim();
  try {
    const data = await callTool('query_school_scores', {
      schoolName: document.getElementById('sc-school').value.trim() || undefined,
      year: year ? Number(year) : undefined,
      pageSize: 15,
    });
    renderTable(el, data.list || data.data, { schoolName: '学校', subjectName: '专业', year: '年份', lowestScore: '最低分', totalAdmissions: '录取总数' });
  } catch (e) {
    el.className = 'result error';
    el.textContent = '查询失败：' + e.message;
  }
}

async function searchAdjustments() {
  const el = document.getElementById('adj-res');
  el.className = 'result loading';
  el.textContent = '查询中…';
  const score = document.getElementById('adj-score').value.trim();
  try {
    const data = await callTool('query_adjustments', {
      minScore: score ? Number(score) : undefined,
      targetSchoolName: document.getElementById('adj-subject').value.trim() || undefined,
      pageSize: 15,
    });
    renderTable(el, data.list || data.data, { targetSchoolName: '调剂院校', targetSubjectName: '调剂专业', initialTestScore: '初试分', adjustmentType: '类型' });
  } catch (e) {
    el.className = 'result error';
    el.textContent = '查询失败：' + e.message;
  }
}
</script>
</body>
</html>
